<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Roblox Runner - Универсальное управление</title>
    <style>
        /* Сброс стандартных отступов и запрет зума */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100dvh; /* Используем динамическую высоту */
            min-height: 100vh;
            background-color: #0f172a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }
        .game-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            height: 100dvh;
            height: 100vh;
            background: #1e293b;
            padding: 10px;
        }
        .canvas-container {
            position: relative;
            width: 100%;
            height: 100%; /* Заполняет всё доступное пространство */
            max-width: 1100px; /* Ограничиваем для очень широких экранов */
            max-height: 90vh;
            border-radius: 12px;
            overflow: hidden;
            border: 3px solid #38bdf8;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            background: #87CEEB;
            /* Сохраняем пропорции холста внутри контейнера */
            aspect-ratio: 800 / 400; 
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: pointer;
            background: inherit;
            touch-action: none;
            /* Canvas растягивается внутри контейнера, сохраняя пропорции */
            object-fit: contain; 
        }
        
        /* Кнопка полноэкранного режима */
        #fullscreenBtn {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 44px;
            height: 44px;
            background: rgba(44, 62, 80, 0.85);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            color: white;
            font-size: 22px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 20;
            transition: 0.2s;
            touch-action: manipulation;
            pointer-events: auto;
        }
        #fullscreenBtn:hover {
            background: #2c3e50;
            border-color: #f1c40f;
        }
        #fullscreenBtn:active {
            transform: scale(0.9);
        }

        /* Панель информации внизу */
        .ui-text-panel {
            margin-top: 10px;
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 900px;
            padding: 8px 15px;
            background: rgba(44, 62, 80, 0.9);
            border-radius: 8px;
            color: white;
            border: 1px solid #38bdf8;
            font-size: 14px;
            flex-shrink: 0;
        }
        @media (max-width: 600px) {
            .ui-text-panel { font-size: 12px; flex-direction: row; flex-wrap: wrap; gap: 5px; }
        }
    </style>
</head>
<body>

<div class="game-wrapper">
    <div class="canvas-container" id="gameContainer">
        <canvas id="gameCanvas" width="800" height="400"></canvas>
        <!-- Кнопка полноэкранного режима -->
        <div id="fullscreenBtn" title="Полноэкранный режим">⛶</div>
    </div>
    <div class="ui-text-panel">
        <div>🪙 Монет: <span id="coinScore" style="color: #f1c40f;">0</span></div>
        <div>Клик/Тап/Пробел = Прыжок | S/↓ = Присесть | M = Магазин</div>
    </div>
</div>

<script>
    // --- Полноэкранный режим ---
    const fsBtn = document.getElementById('fullscreenBtn');
    fsBtn.addEventListener('click', () => {
        const container = document.getElementById('gameContainer');
        if (!document.fullscreenElement) {
            container.requestFullscreen().catch(err => {});
        } else {
            document.exitFullscreen();
        }
    });

    // --- Инициализация холста ---
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const coinScoreElement = document.getElementById('coinScore');

    // Игровые переменные
    let gameRunning = true;    
    let isGameOver = false;    
    let isShopOpen = false; 
    let coins = 0; 
    let gameSpeed = 6;
    const GROUND_Y = 340;
    let frameCount = 0;
    let shopScrollY = 0;
    let framesSinceLastObstacle = 100;

    // Иконка магазина
    const shopIcon = { x: 730, y: 20, size: 40 };

    // Переменные для таймера (в углу)
    const megaTimer = {
        x: 690, 
        y: 25,
        radius: 18,
        timer: 0,
        cooldown: 600,
        ready: false,
    };
    
    // ==========================================
    // ШКАЛА ОЧКОВ (ЛЕВЫЙ ВЕРХНИЙ УГОЛ) - БЕСКОНЕЧНАЯ
    // ==========================================
    const scoreBar = {
        current: 0,        
        maxVisual: 1000000000, 
        x: 20,             
        y: 30,             
        w: 150,            
        h: 14,             
    };

    function formatNumber(num) {
        return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, " ");
    }

    function updateScoreBar() {
        if (gameRunning && !isGameOver && !isShopOpen) {
            scoreBar.current += 0.5; 
        }
    }

    function drawScoreBar() {
        const x = scoreBar.x;
        const y = scoreBar.y;
        const w = scoreBar.w;
        const h = scoreBar.h;

        const barColor = isNight ? '#2ecc71' : '#f1c40f'; 
        const bgColor = isNight ? 'rgba(255,255,255,0.2)' : 'rgba(0,0,0,0.2)';
        const textColor = isNight ? '#ecf0f1' : '#000';

        ctx.fillStyle = textColor;
        ctx.font = 'bold 14px Arial';
        ctx.textAlign = 'left';
        ctx.textBaseline = 'middle';
        ctx.fillText('⚡ SCORE', x, y - 8);

        ctx.fillStyle = bgColor;
        ctx.strokeStyle = isNight ? 'rgba(255,255,255,0.5)' : 'rgba(0,0,0,0.3)';
        ctx.lineWidth = 1.5;
        ctx.fillRect(x, y, w, h);
        ctx.strokeRect(x, y, w, h);

        const progress = Math.min(scoreBar.current / scoreBar.maxVisual, 1);
        ctx.fillStyle = barColor;
        ctx.fillRect(x + 1, y + 1, (w - 2) * progress, h - 2);

        ctx.fillStyle = isNight ? '#ecf0f1' : '#2c3e50';
        ctx.font = 'bold 8px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(formatNumber(Math.floor(scoreBar.current)), x + w/2, y + h/2);
    }

    // ==========================================
    // ШКАЛА МОНЕТ (ПРАВЫЙ ВЕРХНИЙ УГОЛ) - БЕСКОНЕЧНАЯ

        const y = coinBar.y;
        const w = coinBar.w;
        const h = coinBar.h;

        const barColor = isNight ? '#2ecc71' : '#f1c40f'; 
        const bgColor = isNight ? 'rgba(255,255,255,0.2)' : 'rgba(0,0,0,0.2)';

        ctx.font = 'bold 14px Arial';
        ctx.textAlign = 'right';
        ctx.textBaseline = 'middle';

        ctx.strokeStyle = isNight ? 'rgba(255,255,255,0.5)' : 'rgba(0,0,0,0.3)';
        ctx.lineWidth = 1.5;
        ctx.fillRect(x, y, w, h);
        ctx.strokeRect(x, y, w, h);

        const coinProgress = Math.min(coins / coinBar.maxVisual, 1);
        ctx.fillStyle = barColor;
        ctx.fillRect(x + 1, y + 1, (w - 2) * coinProgress, h - 2);

        ctx.fillStyle = isNight ? '#ecf0f1' : '#2c3e50';
        ctx.font = 'bold 8px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(formatNumber(coins), x + w/2, y + h/2);

    function getActiveSkin() {
        return skins.find(s => s.equipped === true);
    }

    // ==========================================
    // ОТРИСОВКА ТАЙМЕРА И ИНТЕРФЕЙСА
    // ==========================================
    function drawTimerInterface() {
        const centerX = megaTimer.x;
        const centerY = megaTimer.y;
        const radius = megaTimer.radius;
        const lineWidth = 4;

        ctx.beginPath();
        ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
        ctx.strokeStyle = '#34495e';
        ctx.lineWidth = lineWidth;
        ctx.stroke();

        const progress = Math.min(megaTimer.timer / megaTimer.cooldown, 1);
        const endAngle = -Math.PI / 2 + (Math.PI * 2 * progress);
        
        ctx.beginPath();
        ctx.arc(centerX, centerY, radius, -Math.PI / 2, endAngle);
        ctx.strokeStyle = megaTimer.ready ? '#2ecc71' : '#f1c40f';
        ctx.lineWidth = lineWidth;
        ctx.stroke();

        ctx.fillStyle = '#ecf0f1';
        ctx.font = 'bold 12px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(megaTimer.ready ? 'GO!' : '10s', centerX, centerY);
    }

    function drawShopIcon() {
        ctx.fillStyle = '#2c3e50';
        ctx.shadowColor = 'black';
        ctx.shadowBlur = 10;
        ctx.beginPath();
        ctx.arc(shopIcon.x + shopIcon.size/2, shopIcon.y + shopIcon.size/2, shopIcon.size/2, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
        
        ctx.fillStyle = '#f1c40f';
        ctx.font = '26px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('🛒', shopIcon.x + shopIcon.size/2, shopIcon.y + shopIcon.size/2 + 2);
    }

    function drawShop() {
        if (!isShopOpen) return;

        ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const shopW = 650, shopH = 380; 
        const shopX = (canvas.width - shopW) / 2;
        const shopY = (canvas.height - shopH) / 2;
        
        ctx.fillStyle = '#ecf0f1';
        ctx.shadowColor = 'black';
        ctx.shadowBlur = 20;
        ctx.fillRect(shopX, shopY, shopW, shopH);
        ctx.shadowBlur = 0;
        ctx.strokeStyle = '#2c3e50';
        ctx.lineWidth = 4;
        ctx.strokeRect(shopX, shopY, shopW, shopH);

        ctx.fillStyle = '#2c3e50';
        ctx.font = 'bold 30px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('🛒 МАГАЗИН СКИНОВ (26 шт.)', canvas.width / 2, shopY + 45);
        
        ctx.fillStyle = '#c0392b';
        ctx.font = 'bold 24px Arial';
        ctx.fillText('✖', shopX + shopW - 30, shopY + 40);

        ctx.font = '16px Arial';
        ctx.fillStyle = '#34495e';
        ctx.fillText('(Используй колесико мыши, чтобы листать. Кликни, чтобы купить/надеть)', canvas.width / 2, shopY + 75);

        ctx.save();
        ctx.beginPath();
        ctx.rect(shopX + 15, shopY + 85, shopW - 30, shopH - 100);
        ctx.clip();

        const startX = shopX + 25;
        const startY = shopY + 95 - shopScrollY;
        const lineHeight = 38;

        skins.forEach((skin, index) => {
            const yPos = startY + index * lineHeight;
            
            ctx.fillStyle = '#2c3e50';
            ctx.font = '17px Arial';
            ctx.textAlign = 'left';
            ctx.fillText(`${skin.icon || '👤'} ${skin.name}`, startX, yPos);

            ctx.textAlign = 'right';
            if (skin.owned && skin.equipped) {
                ctx.fillStyle = '#27ae60';
                ctx.fillText('✅ НАДЕТ', shopX + shopW - 25, yPos);
            } else if (skin.owned) {
                ctx.fillStyle = '#f39c12';
                ctx.fillText('Куплен', shopX + shopW - 25, yPos);
            } else {
                ctx.fillStyle = '#c0392b';
                ctx.fillText(`${skin.price} 🪙`, shopX + shopW - 25, yPos);
            }
            ctx.textAlign = 'left';
        });
        ctx.restore();
    }

    function handleShopClick(mouseX, mouseY) {
        const distToIcon = Math.hypot(mouseX - (shopIcon.x + shopIcon.size/2), mouseY - (shopIcon.y + shopIcon.size/2));
        if (distToIcon < shopIcon.size/2) {
            if (!isShopOpen) {
                isShopOpen = true;
                shopScrollY = 0;
            } else {
                isShopOpen = false;
            }
            return true;
        }

        if (isShopOpen) {
            const shopW = 650, shopH = 380;
            const shopX = (canvas.width - shopW) / 2;
            const shopY = (canvas.height - shopH) / 2;

            const closeX = shopX + shopW - 30;
            const closeY = shopY + 40;
            if (Math.hypot(mouseX - closeX, mouseY - closeY) < 20) {
                isShopOpen = false;
                return true;
            }

            if (mouseX > shopX + 15 && mouseX < shopX + shopW - 15 && mouseY > shopY + 85 && mouseY < shopY + shopH - 15) {
                const startX = shopX + 25;
                const startY = shopY + 95 - shopScrollY;
                const lineHeight = 38;

                for(let i=0; i<skins.length; i++) {
                    const yPos = startY + i * lineHeight;
                    if (mouseY >= yPos - 15 && mouseY <= yPos + 15) {
                        const skin = skins[i];
                        if (skin.owned) {
                            if (!skin.equipped) {
                                skins.forEach(s => s.equipped = false);
                                skin.equipped = true;
                            }
                        } else {
                            if (coins >= skin.price) {
                                if (confirm(`Купить скин "${skin.name}" за ${skin.price} монет?`)) {
                                    coins -= skin.price;
                                    skin.owned = true;
                                    skins.forEach(s => s.equipped = false);
                                    skin.equipped = true;
                                    updateCoinUI();
                                }
                            } else {
                                alert(`Не хватает монет! Нужно: ${skin.price}`);
                            }
                        }
                        return true;
                    }
                }
            }
        }
        return false;
    }

    canvas.addEventListener('wheel', (e) => {
        if (isShopOpen) {
            e.preventDefault();
            const maxScroll = Math.max(0, (skins.length * 38) - 250);
            shopScrollY += e.deltaY > 0 ? 40 : -40;
            shopScrollY = Math.max(0, Math.min(shopScrollY, maxScroll));
        }
    });

    // ==========================================
    // ПЕРСОНАЖ И МЕГА-ПРЫЖОК
    // ==========================================
    const player = {
        x: 80,
        y: GROUND_Y,
        width: 24,  
        height: 32, 
        headSize: 24, 
        jumping: false,
        jumpVelocity: 0,
        gravity: 0.7,
        jumpPower: -13,
        ducking: false,
        legAnim: 0,
        
        reset() {
            this.y = GROUND_Y;
            this.jumping = false;
            this.jumpVelocity = 0;
            this.ducking = false;
            this.legAnim = 0;
            megaTimer.timer = 0;
            megaTimer.ready = false;
        },

        update() {
            if (this.jumping) {
                this.y += this.jumpVelocity;
                this.jumpVelocity += this.gravity;
                if (this.y >= GROUND_Y) {
                    this.y = GROUND_Y;
                    this.jumping = false;
                }
            }
            if (gameRunning && !isGameOver) this.legAnim += 0.2;

            if (gameRunning && !isGameOver && !isShopOpen) {
                if (megaTimer.timer < megaTimer.cooldown) {
                    megaTimer.timer++;
                    megaTimer.ready = false;
                } else {
                    megaTimer.ready = true;
                }
            }
        },

        draw() {
            const activeSkin = getActiveSkin();
            const colors = activeSkin.colors;

            const isDucking = this.ducking && !this.jumping;
            let bodyHeight = isDucking ? this.height / 2 : this.height;
            let bodyY = isDucking ? this.y - bodyHeight : this.y - this.height;

            if (activeSkin.id === 5) activeSkin.drawExtra(this.x, this.y, this.height);
            else if (activeSkin.id === 3) activeSkin.drawExtra(this.x, this.y, this.height);

            ctx.fillStyle = colors.skin;
            ctx.strokeStyle = '#5d4037';
            ctx.lineWidth = 1.5;
            ctx.fillRect(this.x - 6, bodyY + 6, 6, 16);
            ctx.strokeRect(this.x - 6, bodyY + 6, 6, 16);
            const armSway = Math.sin(this.legAnim) * 4;
            ctx.fillRect(this.x + this.width, bodyY + 6 + armSway, 6, 16);
            ctx.strokeRect(this.x + this.width, bodyY + 6 + armSway, 6, 16);

            ctx.fillStyle = colors.shirt;
            ctx.fillRect(this.x, bodyY, this.width, bodyHeight);
            ctx.strokeRect(this.x, bodyY, this.width, bodyHeight);

            ctx.fillStyle = '#5d4037';
            ctx.fillRect(this.x, bodyY + bodyHeight - 4, this.width, 4);

            ctx.fillStyle = colors.pants;
            if (!this.jumping && gameRunning && !isGameOver) {
                const legSway = Math.sin(this.legAnim) * 5;
                ctx.fillRect(this.x + 2, this.y - 6, 8, 14 + legSway);
                ctx.strokeRect(this.x + 2, this.y - 6, 8, 14 + legSway);
                ctx.fillRect(this.x + 14, this.y - 6, 8, 14 - legSway);
                ctx.strokeRect(this.x + 14, this.y - 6, 8, 14 - legSway);
            } else {
                ctx.fillRect(this.x + 2, this.y - 6, 8, 14);
                ctx.strokeRect(this.x + 2, this.y - 6, 8, 14);
                ctx.fillRect(this.x + 14, this.y - 6, 8, 14);
                ctx.strokeRect(this.x + 14, this.y - 6, 8, 14);
            }

            const headX = this.x - 2;
            const headY = bodyY - this.headSize;
            
            ctx.fillStyle = colors.skin;
            ctx.fillRect(headX, headY, this.headSize + 4, this.headSize);
            ctx.strokeRect(headX, headY, this.headSize + 4, this.headSize);

            if (activeSkin.drawExtra && activeSkin.id !== 3 && activeSkin.id !== 5) {
                activeSkin.drawExtra(this.x, this.y, this.height);
            }

            if (activeSkin.id !== 2 && activeSkin.id !== 4 && activeSkin.id !== 5 && 
                activeSkin.id !== 10 && activeSkin.id !== 11 && activeSkin.id !== 12 && 
                activeSkin.id !== 14 && activeSkin.id !== 17 && activeSkin.id !== 20) {
                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.arc(headX + 6, headY + 10, 2.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(headX + 18, headY + 10, 2.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 1.5;
                ctx.arc(headX + 12, headY + 14, 6, 0.1, Math.PI - 0.1);
                ctx.stroke();
            }
        },

        jump() {
            if (!this.jumping && gameRunning && !isGameOver) {
                this.jumping = true;
                this.jumpVelocity = this.jumpPower;
            } 
            else if (this.jumping && gameRunning && !isGameOver && megaTimer.ready) {
                this.jumpVelocity = -20;
                megaTimer.timer = 0;
                megaTimer.ready = false;
            }
        },
        
        duck(isDucking) {
            if (gameRunning && !this.jumping && !isGameOver) {
                this.ducking = isDucking;
            }
        }
    };

    // ==========================================
    // ПРЕПЯТСТВИЯ
    // ==========================================
    const obstacles = [];

    class Obstacle {
        constructor(type) {
            this.x = canvas.width + 50;
            this.passed = false;
            this.type = type || (Math.random() > 0.5 ? 'cactus' : 'flying_head');
            
            if (this.type === 'cactus') {
                this.y = GROUND_Y;
                this.width = 20 + Math.random() * 20;
                this.height = 35 + Math.random() * 30;
            } else {
                this.y = GROUND_Y - 80 - Math.random() * 50; 
                this.width = 30;
                this.height = 30;
            }
        }

        draw() {
            if (this.type === 'cactus') {
                ctx.fillStyle = '#e74c3c';
                ctx.strokeStyle = '#922b21';
                ctx.fillRect(this.x, this.y - this.height, this.width, this.height);
                ctx.strokeRect(this.x, this.y - this.height, this.width, this.height);
                
                ctx.strokeStyle = '#922b21';
                for(let i=0; i<this.width; i+=10) {
                    ctx.beginPath();
                    ctx.moveTo(this.x + i, this.y - this.height);
                    ctx.lineTo(this.x + i, this.y - this.height - 8);
                    ctx.stroke();
                }
            } else {
                ctx.fillStyle = '#8e44ad';
                ctx.strokeStyle = '#4a235a';
                
                ctx.beginPath();
                ctx.arc(this.x + this.width/2, this.y + this.height/2, this.width/2, 0, Math.PI*2);
                ctx.fill();
                ctx.stroke();
                
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(this.x + 8, this.y + 10, 6, 0, Math.PI*2);
                ctx.arc(this.x + 22, this.y + 10, 6, 0, Math.PI*2);
                ctx.fill();
                ctx.stroke();

                ctx.fillStyle = 'red';
                ctx.beginPath();
                ctx.arc(this.x + 9, this.y + 11, 3, 0, Math.PI*2);
                ctx.arc(this.x + 23, this.y + 11, 3, 0, Math.PI*2);
                ctx.fill();

                ctx.strokeStyle = '#4a235a';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(this.x + 5, this.y + 20);
                ctx.lineTo(this.x + 25, this.y + 20);
                ctx.stroke();

                ctx.fillStyle = '#4a235a';
                ctx.beginPath();
                ctx.moveTo(this.x + 5, this.y + 5);
                ctx.lineTo(this.x + 10, this.y - 10);
                ctx.lineTo(this.x + 15, this.y + 0);
                ctx.lineTo(this.x + 20, this.y - 10);
                ctx.lineTo(this.x + 25, this.y + 5);
                ctx.fill();
            }
        }

        update() {
            this.x -= gameSpeed;

            let pHeight = player.ducking && !player.jumping ? player.height / 2 : player.height;
            let pHeadY = (player.y - pHeight) - player.headSize; 
            
            const playerBox = {
                x: player.x - 6,
                y: pHeadY, 
                w: player.width + 12,
                h: (player.y - pHeadY)
            };

            const obsBox = {
                x: this.x,
                y: this.y - this.height,
                w: this.width,
                h: this.height
            };

            if (playerBox.x < obsBox.x + obsBox.w &&
                playerBox.x + playerBox.w > obsBox.x &&
                playerBox.y < obsBox.y + obsBox.h &&
                playerBox.y + playerBox.h > obsBox.y) {
                gameRunning = false;
                isGameOver = true;
            }

            if (!this.passed && this.x + this.width < player.x) {
                this.passed = true;
                coins += 10;
                updateCoinUI();
                scoreBar.current += 10;
            }
        }
    }

    // ==========================================
    // ИНТЕРФЕЙС И ОТРИСОВКА ФОНА
    // ==========================================

    function updateCoinUI() {
        coinScoreElement.textContent = coins;
    }

    function drawEnvironment() {
        if (!isShopOpen) {
            cycleTimer += 16; 
            if (!isNight && cycleTimer >= DAY_DURATION) {
                isNight = true;
                cycleTimer = 0;
            } else if (isNight && cycleTimer >= NIGHT_DURATION) {
                isNight = false;
                cycleTimer = 0;
            }
        }

        let skyGradient;
        if (isNight) {
            skyGradient = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
            skyGradient.addColorStop(0, '#0b132b');
            skyGradient.addColorStop(0.5, '#1c2541');
            skyGradient.addColorStop(1, '#3a506b');
        } else {
            skyGradient = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
            skyGradient.addColorStop(0, '#4ea8de');
            skyGradient.addColorStop(0.6, '#90e0ef');
            skyGradient.addColorStop(1, '#caf0f8');
        }
        ctx.fillStyle = skyGradient;
        ctx.fillRect(0, 0, canvas.width, GROUND_Y);

        if (isNight) {
            ctx.fillStyle = '#fff';
            stars.forEach(star => {
                let alpha = 0.4 + Math.sin(star.twinkle + frameCount * 0.04) * 0.5;
                ctx.globalAlpha = Math.max(0, Math.min(1, alpha));
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.r, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1.0;

            ctx.fillStyle = '#f4f6f0';
            ctx.shadowColor = 'rgba(255, 255, 255, 0.2)';
            ctx.shadowBlur = 20;
            ctx.beginPath();
            ctx.arc(moon.x, moon.y, moon.radius, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#d5d8dc';
            ctx.shadowBlur = 0;
            ctx.beginPath();
            ctx.arc(moon.x - 8, moon.y - 5, 6, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0; 
        } else {
            ctx.fillStyle = '#f9e79f';
            ctx.shadowColor = 'rgba(255, 200, 0, 0.4)';
            ctx.shadowBlur = 50;
            ctx.beginPath();
            ctx.arc(sun.x, sun.y, sun.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;

            clouds.forEach(cloud => {
                if (gameRunning && !isGameOver && !isShopOpen) {
                    cloud.x -= cloud.speed;
                    if (cloud.x + cloud.w < 0) cloud.x = canvas.width + 50;
                }
                ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                ctx.beginPath();
                ctx.ellipse(cloud.x, cloud.y, cloud.w/2, 20, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(cloud.x + 30, cloud.y - 10, cloud.w/3, 15, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(cloud.x - 30, cloud.y + 5, cloud.w/3, 15, 0, 0, Math.PI * 2);
                ctx.fill();
            });
        }
    }

    function drawGround() {
        let groundColor = isNight ? '#1e272e' : '#d35400';
        let grassColor = isNight ? '#2d3436' : '#27ae60';
        let linesColor = isNight ? '#485460' : '#a04000';

        ctx.fillStyle = groundColor;
        ctx.fillRect(0, GROUND_Y, canvas.width, canvas.height - GROUND_Y);
        
        ctx.fillStyle = grassColor;
        ctx.fillRect(0, GROUND_Y - 4, canvas.width, 8);
        
        ctx.strokeStyle = linesColor;
        ctx.lineWidth = 2;
        for (let i = 0; i < canvas.width; i += 50) {
            const offset = (frameCount * (gameRunning && !isGameOver ? gameSpeed : 1)) % 50;
            ctx.beginPath();
            ctx.moveTo(i - offset, GROUND_Y + 10);
            ctx.lineTo(i - offset + 25, GROUND_Y + 10);
            ctx.stroke();
        }
    }

    function spawnObstacle() {
        framesSinceLastObstacle++;
        if (gameRunning && !isGameOver && !isShopOpen && framesSinceLastObstacle > 30 && Math.random() < 0.035) {
            let type = Math.random() > 0.5 ? 'cactus' : 'flying_head';
            obstacles.push(new Obstacle(type));
            framesSinceLastObstacle = 0;
        }
    }

    function drawMenu() {
        ctx.fillStyle = '#000';
        ctx.font = 'bold 28px "Courier New", monospace';
        ctx.textAlign = 'center';
        ctx.fillText('PRESS START', canvas.width / 2, 120);

        const btnX = canvas.width / 2 - 70;
        const btnY = 150;
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 3;
        ctx.strokeRect(btnX, btnY, 140, 50);
        ctx.font = 'bold 22px "Courier New", monospace';
        ctx.fillText('START', canvas.width / 2, btnY + 32);
        ctx.textAlign = 'left';
    }

    function drawGameOver() {
        ctx.fillStyle = 'rgba(192, 57, 43, 0.4)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#c0392b';
        ctx.font = 'bold 40px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 20);
        ctx.font = '20px Arial';

    // ==========================================
    // ФУНКЦИЯ ОТРИСОВКИ КНОПКИ ПРЫЖКА
    // ==========================================
    function drawJumpButton() {
        // Координаты и размеры кнопки (в правом нижнем углу)
        const bx = 700;
        const by = 320;
        const bw = 80;
        const bh = 60;

        // Рисуем закругленный прямоугольник
        ctx.fillStyle = 'rgba(44, 62, 80, 0.85)';
        ctx.shadowColor = 'rgba(0,0,0,0.5)';
        ctx.shadowBlur = 10;
        ctx.beginPath();
        ctx.roundRect(bx, by, bw, bh, 15);
        ctx.fill();
        ctx.shadowBlur = 0;

        // Обводка
        ctx.strokeStyle = '#f1c40f';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.roundRect(bx, by, bw, bh, 15);
        ctx.stroke();

        // Текст "ПРЫЖОК"
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 16px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('⬆ ПРЫЖОК', bx + bw/2, by + bh/2);
        
        // Сохраняем координаты для проверки нажатия
        window.jumpBtn = { x: bx, y: by, w: bw, h: bh };
    }

    // Полифилл для roundRect, если браузер старый
    if (!CanvasRenderingContext2D.prototype.roundRect) {
        CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
            if (r > w/2) r = w/2;
            if (r > h/2) r = h/2;
            this.moveTo(x + r, y);
            this.lineTo(x + w - r, y);
            this.quadraticCurveTo(x + w, y, x + w, y + r);
            this.lineTo(x + w, y + h - r);
            this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            this.lineTo(x + r, y + h);
            this.quadraticCurveTo(x, y + h, x, y + h - r);
            this.lineTo(x, y + r);
            this.quadraticCurveTo(x, y, x + r, y);
            return this;
        };
    }

    function startGame() {
        gameRunning = true;
        isGameOver = false;
        obstacles.length = 0;
        player.reset();
        gameSpeed = 6;
        framesSinceLastObstacle = 70;
        updateCoinUI();
    }

    document.addEventListener('keydown', (e) => {
        if (e.code === 'KeyM') {
            e.preventDefault();
            if (!isShopOpen) {
                isShopOpen = true;
                shopScrollY = 0;
            } else {
                isShopOpen = false;
            }
        }

        if (e.code === 'Space') {
            e.preventDefault();
            if (!gameRunning) {
                startGame();
            } else if (isGameOver) {
                startGame();
            } else if (!isShopOpen) {
                player.jump();
            }
        }
        if (e.code === 'ArrowDown' || e.code === 'KeyS') {
            e.preventDefault();
            if (!isShopOpen && gameRunning && !isGameOver) player.duck(true);
        }
    });

    document.addEventListener('keyup', (e) => {
        if (e.code === 'ArrowDown' || e.code === 'KeyS') {
            e.preventDefault();
            if (!isShopOpen) player.duck(false);
        }
    });

    // ==========================================
    // ПОДДЕРЖКА ТЕЛЕФОНА (СЕНСОРНЫЕ КАСАНИЯ)
    // ==========================================
    let touchStartX = 0;
    let touchStartY = 0;

    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const touch = e.touches[0];
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const touchX = (touch.clientX - rect.left) * scaleX;
        const touchY = (touch.clientY - rect.top) * scaleY;

        // Если магазин открыт - работаем с покупками
        if (isShopOpen) {
            handleShopClick(touchX, touchY);
            return;
        }

        // Если игра не запущена - запускаем
        if (!gameRunning) {
            startGame();
            return;
        }

        // Если Game Over - рестарт
        if (isGameOver) {
            startGame();
            return;
        }

        // --- ПРОВЕРКА НАЖАТИЯ НА КНОПКУ ПРЫЖКА ---
        if (window.jumpBtn) {
            const b = window.jumpBtn;
            if (touchX >= b.x && touchX <= b.x + b.w &&
                touchY >= b.y && touchY <= b.y + b.h) {
                if (!isShopOpen) player.jump();
                return; // Если нажали на кнопку, то не делаем обычный тап по экрану
            }
        }

        // Обычный тап в любом месте экрана (кроме кнопки)
        if (!isShopOpen) player.jump();

        // Для свайпов (запоминаем начало)
        touchStartX = touchX;
        touchStartY = touchY;
    }, { passive: false });

    // ПОДДЕРЖКА СВАЙПА ВНИЗ (Приседание на телефоне)
    canvas.addEventListener('touchmove', (e) => {
        e.preventDefault();
        if (!gameRunning || isGameOver || isShopOpen || player.jumping) return;
        
        const touch = e.touches[0];
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const touchX = (touch.clientX - rect.left) * scaleX;
        const touchY = (touch.clientY - rect.top) * scaleY;

        if (touchY - touchStartY > 30) {
            player.duck(true);
        } else {
            player.duck(false);
        }
    }, { passive: false });

    canvas.addEventListener('touchend', (e) => {
        e.preventDefault();
        player.duck(false);
    }, { passive: false });

    // ==========================================
    // ЛОГИКА ИГРЫ
    // ==========================================

    function gameLoop() {
        frameCount++;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        drawEnvironment();
        drawGround();

        // --- ЛОГИКА ИГРЫ ---
        if (gameRunning && !isGameOver && !isShopOpen) {
            updateScoreBar();
            
            player.update();
            spawnObstacle();

            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].update();
                if (obstacles[i].x < -50) {
                    obstacles.splice(i, 1);
                }
            }

            player.draw();
            obstacles.forEach(obs => obs.draw());
            gameSpeed += 0.001;
        } 
        // --- МАГАЗИН ОТКРЫТ ---
        else if (gameRunning && !isGameOver && isShopOpen) {
            player.draw();
            obstacles.forEach(obs => obs.draw());
        } 
        // --- МЕНЮ ---
        else if (!gameRunning) {
            player.draw();
            drawMenu();
        } 
        // --- GAME OVER ---
        else if (isGameOver) {
            player.draw();
            obstacles.forEach(obs => obs.draw());
            drawGameOver();
        }

        // --- ИНТЕРФЕЙС (РИСУЕТСЯ ВСЕГДА ПОВЕРХ ВСЕГО) ---
        drawScoreBar();      // ЛЕВЫЙ ВЕРХНИЙ УГОЛ
        drawCoinBar();       // ПРАВЫЙ ВЕРХНИЙ УГОЛ
        drawTimerInterface();
        drawShopIcon();
        drawJumpButton();    // КНОПКА ПРЫЖКА ДЛЯ ТЕЛЕФОНА
        drawShop();

        requestAnimationFrame(gameLoop);
    }

    updateCoinUI();
    gameLoop();
</script>
